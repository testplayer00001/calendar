<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>勤務カレンダー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3248;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --today-bg: #1e3a5f;
  --today-border: #3b82f6;
  --休: #ff6b6b;
  --朝: #60a5fa;
  --昼: #fbbf24;
  --夜: #a78bfa;
  --有給: #34d399;
  --休-bg: rgba(255,107,107,0.12);
  --朝-bg: rgba(96,165,250,0.12);
  --昼-bg: rgba(251,191,36,0.12);
  --夜-bg: rgba(167,139,250,0.12);
  --有給-bg: rgba(52,211,153,0.12);
}
html.light {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #e8edf2;
  --border: #c8d0da;
  --text: #1a202c;
  --text-muted: #64748b;
  --today-bg: #dbeafe;
  --today-border: #3b82f6;
  --休: #e53e3e;
  --朝: #2563eb;
  --昼: #d97706;
  --夜: #7c3aed;
  --有給: #059669;
  --休-bg: rgba(229,62,62,0.1);
  --朝-bg: rgba(37,99,235,0.1);
  --昼-bg: rgba(217,119,6,0.1);
  --夜-bg: rgba(124,58,237,0.1);
  --有給-bg: rgba(5,150,105,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 80px 20px 32px; -webkit-tap-highlight-color: transparent; transition: background 0.2s, color 0.2s; }
header { text-align: center; margin-bottom: 40px; }
header h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: 0.1em; color: var(--text); margin-bottom: 8px; }
header p { font-size: 0.85rem; color: var(--text-muted); letter-spacing: 0.05em; }
.controls { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; max-width: 820px; margin: 0 auto 32px; }
.ctrl-group { display: flex; align-items: center; gap: 8px; }
.ctrl-group label { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; letter-spacing: 0.05em; }
select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.85rem; font-family: 'DM Mono', monospace; outline: none; transition: border-color 0.2s; -webkit-appearance: none; cursor: pointer; }
select:focus { border-color: #3b82f6; }
select:focus:not(:focus-visible) { border-color: var(--border); outline: none; }
.month-nav { display: flex; align-items: center; gap: 8px; }
.nav-btn { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, border-color 0.2s; flex-shrink: 0; outline: none; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
.nav-btn:hover { border-color: #3b82f6; }
.nav-btn:focus:not(:focus-visible), .nav-btn:active, .nav-btn:focus { outline: none; box-shadow: none; border-color: var(--border); }
.nav-btn:focus-visible { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.4); }
.month-label { font-family: 'DM Mono', monospace; font-size: 0.9rem; color: var(--text); min-width: 90px; text-align: center; letter-spacing: 0.05em; }
.today-btn { display: flex; align-items: center; gap: 5px; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.78rem; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: background 0.2s, border-color 0.2s, color 0.2s; white-space: nowrap; letter-spacing: 0.05em; }
.today-btn:hover { border-color: #3b82f6; color: #3b82f6; }
.today-btn:focus, .today-btn:active { outline: none; box-shadow: none; }
.today-btn:focus:not(:focus-visible) { outline: none; }
.print-btn { display: flex; align-items: center; gap: 6px; background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; border-radius: 8px; padding: 8px 14px; font-size: 0.82rem; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: background 0.2s; white-space: nowrap; }
.print-btn:hover { background: #1e4a7f; }
.print-btn:focus:not(:focus-visible) { outline: none; box-shadow: none; }
html.light .print-btn { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
html.light .print-btn:hover { background: #bfdbfe; }
.news-btn { position: relative; display: flex; align-items: center; gap: 6px; background: #1a2a1a; color: #86efac; border: 1px solid #22c55e; border-radius: 8px; padding: 8px 14px; font-size: 0.82rem; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: background 0.2s; white-space: nowrap; }
.news-btn:hover { background: #1e3a1e; }
.news-btn:focus:not(:focus-visible) { outline: none; }
html.light .news-btn { background: #dcfce7; color: #15803d; border-color: #22c55e; }
html.light .news-btn:hover { background: #bbf7d0; }
.news-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: #fff; font-size: 0.6rem; font-weight: 700; font-family: 'DM Mono', monospace; border-radius: 99px; padding: 1px 5px; min-width: 16px; text-align: center; line-height: 1.4; pointer-events: none; }
.news-badge.hidden { display: none; }
.kyuuka-btn { display: flex; align-items: center; gap: 6px; background: var(--有給-bg); color: var(--有給); border: 1px solid var(--有給); border-radius: 8px; padding: 8px 14px; font-size: 0.82rem; font-family: 'Noto Sans JP', sans-serif; font-weight: 500; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: background 0.2s; white-space: nowrap; }
.kyuuka-btn:hover { background: rgba(52,211,153,0.2); }
.kyuuka-btn:focus:not(:focus-visible) { outline: none; }
.settings-btn { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: border-color 0.2s, color 0.2s; flex-shrink: 0; user-select: none; -webkit-user-select: none; }
.settings-btn:hover { border-color: #3b82f6; color: var(--text); }
.settings-btn:focus:not(:focus-visible) { outline: none; }
.settings-btn svg { width: 16px; height: 16px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 32px; width: min(420px, 92vw); display: flex; flex-direction: column; gap: 20px; }
.modal h2 { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: 0.08em; text-align: center; }
.modal-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.modal-row label { font-size: 0.8rem; color: var(--text-muted); min-width: 60px; }
.modal select { flex: 1; min-width: 80px; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
.btn-cancel { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; padding: 10px 20px; font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: background 0.2s; }
.btn-cancel:hover { background: var(--border); }
.btn-cancel:focus:not(:focus-visible) { outline: none; }
.btn-print { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; border-radius: 8px; padding: 10px 20px; font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: background 0.2s; }
.btn-print:hover { background: #1e4a7f; }
.btn-print:focus:not(:focus-visible) { outline: none; }
html.light .btn-print { background: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
html.light .btn-print:hover { background: #bfdbfe; }
.btn-danger { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid #ef4444; border-radius: 8px; padding: 10px 20px; font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: background 0.2s; }
.btn-danger:hover { background: rgba(239,68,68,0.22); }
.btn-danger:focus:not(:focus-visible) { outline: none; }
.news-modal { width: min(520px, 94vw); gap: 0; padding: 0; overflow: hidden; }
.news-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 28px 18px; border-bottom: 1px solid var(--border); }
.news-modal-header h2 { font-size: 1rem; font-weight: 700; color: #22c55e; letter-spacing: 0.1em; text-align: left; display: flex; align-items: center; gap: 8px; }
html.light .news-modal-header h2 { color: #15803d; }
.news-modal-header h2::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; }
.news-close-btn { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; outline: none; transition: color 0.2s, background 0.2s; -webkit-tap-highlight-color: transparent; line-height: 1; }
.news-close-btn:hover { color: var(--text); background: var(--surface2); }
.news-close-btn:focus:not(:focus-visible) { outline: none; }
.news-list { padding: 16px 28px 24px; display: flex; flex-direction: column; gap: 14px; max-height: 60vh; overflow-y: auto; }
.news-list::-webkit-scrollbar { width: 4px; }
.news-list::-webkit-scrollbar-track { background: transparent; }
.news-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.news-item { display: flex; flex-direction: column; gap: 5px; padding: 14px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; border-left: 3px solid transparent; }
.news-item.type-update { border-left-color: #3b82f6; }
.news-item.type-fix    { border-left-color: #22c55e; }
.news-item.type-notice { border-left-color: #fbbf24; }
.news-item.type-maint  { border-left-color: #a78bfa; }
.news-item-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.news-item-date { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.04em; }
.news-item-tag { font-size: 0.65rem; font-weight: 700; border-radius: 4px; padding: 1px 7px; letter-spacing: 0.05em; line-height: 1.6; }
.tag-update { background: rgba(59,130,246,0.15); color: #2563eb; }
.tag-fix    { background: rgba(34,197,94,0.15); color: #15803d; }
.tag-notice { background: rgba(251,191,36,0.15); color: #b45309; }
.tag-maint  { background: rgba(167,139,250,0.15); color: #7c3aed; }
html:not(.light) .tag-update { color: #60a5fa; }
html:not(.light) .tag-fix    { color: #86efac; }
html:not(.light) .tag-notice { color: #fbbf24; }
html:not(.light) .tag-maint  { color: #c4b5fd; }
.news-item-title { font-size: 0.85rem; font-weight: 600; color: var(--text); line-height: 1.4; }
.news-item-body  { font-size: 0.78rem; color: var(--text-muted); line-height: 1.6; }
.kyuuka-modal { width: min(480px, 94vw); }
.kyuuka-modal h2 { color: var(--有給); }
.kyuuka-input { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; font-family: 'DM Mono', monospace; outline: none; transition: border-color 0.2s; width: 100%; -webkit-appearance: none; cursor: pointer; }
.kyuuka-input:focus { border-color: var(--有給); }
.btn-add { background: rgba(52,211,153,0.15); color: var(--有給); border: 1px solid var(--有給); border-radius: 8px; padding: 10px 20px; font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: background 0.2s; }
.btn-add:hover { background: rgba(52,211,153,0.25); }
.btn-add:focus:not(:focus-visible) { outline: none; }
.kyuuka-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
.kyuuka-list::-webkit-scrollbar { width: 4px; }
.kyuuka-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.kyuuka-list-empty { font-size: 0.8rem; color: var(--text-muted); text-align: center; padding: 12px 0; }
.kyuuka-list-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; }
.kyuuka-list-item-date { font-family: 'DM Mono', monospace; font-size: 0.82rem; color: var(--text); letter-spacing: 0.04em; }
.kyuuka-list-item-del { background: none; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; padding: 2px 6px; border-radius: 4px; outline: none; transition: color 0.2s, background 0.2s; -webkit-tap-highlight-color: transparent; line-height: 1; }
.kyuuka-list-item-del:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
.kyuuka-list-item-del:focus:not(:focus-visible) { outline: none; }
.settings-modal { width: min(460px, 94vw); }
.settings-section { display: flex; flex-direction: column; gap: 10px; }
.settings-section-title { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.settings-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.settings-row-label { font-size: 0.85rem; color: var(--text); }
.settings-row-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
.toggle-wrap { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; cursor: pointer; transition: background 0.25s, border-color 0.25s; }
.toggle-slider::before { content: ''; position: absolute; left: 3px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border-radius: 50%; background: var(--text-muted); transition: left 0.25s cubic-bezier(0.34,1.56,0.64,1), background 0.25s; }
.toggle input:checked + .toggle-slider { background: rgba(59,130,246,0.2); border-color: #3b82f6; }
.toggle input:checked + .toggle-slider::before { left: calc(100% - 19px); background: #3b82f6; }
.theme-toggle-wrap { display: flex; align-items: center; gap: 8px; }
.theme-toggle-btn { display: flex; align-items: center; justify-content: center; width: 48px; height: 26px; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; transition: background 0.35s, border-color 0.35s; flex-shrink: 0; user-select: none; -webkit-user-select: none; padding: 0; position: relative; overflow: hidden; }
.theme-toggle-btn:hover { border-color: #3b82f6; }
.theme-toggle-btn:focus:not(:focus-visible) { outline: none; }
.theme-toggle-btn .tt-track { position: absolute; inset: 0; display: flex; align-items: center; padding: 0 4px; justify-content: space-between; pointer-events: none; }
.theme-toggle-btn .tt-track svg { width: 13px; height: 13px; transition: opacity 0.3s; }
.tt-sun { opacity: 0; color: #f59e0b; }
.tt-moon { opacity: 1; color: #93c5fd; }
.theme-toggle-btn .tt-thumb { position: absolute; left: 3px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; border-radius: 50%; background: #93c5fd; transition: left 0.32s cubic-bezier(0.34,1.56,0.64,1), background 0.32s; box-shadow: 0 1px 4px rgba(0,0,0,0.3); pointer-events: none; }
html.light .theme-toggle-btn { background: #fef3c7; border-color: #fbbf24; }
html.light .theme-toggle-btn .tt-sun { opacity: 1; }
html.light .theme-toggle-btn .tt-moon { opacity: 0; }
html.light .theme-toggle-btn .tt-thumb { left: calc(100% - 21px); background: #f59e0b; }
.theme-mode-label { font-size: 0.8rem; color: var(--text-muted); min-width: 52px; }
.settings-select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 0.82rem; font-family: 'DM Mono', monospace; outline: none; -webkit-appearance: none; cursor: pointer; transition: border-color 0.2s; }
.settings-select:focus { border-color: #3b82f6; }
.data-modal { width: min(500px, 94vw); }
.data-list { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
.data-list::-webkit-scrollbar { width: 4px; }
.data-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.data-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; }
.data-item-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.data-item-key { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text-muted); }
.data-item-val { font-size: 0.8rem; color: var(--text); word-break: break-all; }
.data-item-del { background: none; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; padding: 2px 6px; border-radius: 4px; outline: none; transition: color 0.2s, background 0.2s; -webkit-tap-highlight-color: transparent; flex-shrink: 0; line-height: 1; }
.data-item-del:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
.data-item-del:focus:not(:focus-visible) { outline: none; }
.data-empty { font-size: 0.8rem; color: var(--text-muted); text-align: center; padding: 16px 0; }
.storage-stat { display: flex; flex-direction: column; gap: 8px; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; }
.storage-stat-row { display: flex; justify-content: space-between; align-items: baseline; }
.storage-stat-label { font-size: 0.78rem; color: var(--text-muted); }
.storage-stat-value { font-family: 'DM Mono', monospace; font-size: 0.82rem; color: var(--text); }
.storage-bar-wrap { width: 100%; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.storage-bar { height: 100%; border-radius: 99px; background: #3b82f6; transition: width 0.4s ease, background 0.3s; }
.storage-bar.warn { background: #f59e0b; }
.storage-bar.danger { background: #ef4444; }
.storage-stat-note { font-size: 0.72rem; color: var(--text-muted); } { text-align: center; color: var(--text-muted); font-size: 0.85rem; padding: 40px 0; }
@media print {
  body > *:not(#printWrap) { display: none !important; }
  #printWrap { display: block !important; background: #fff; color: #111; font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 0; width: 100%; height: 100%; }
  #printWrap .print-title { text-align: center; font-size: 1.05rem; font-weight: 700; color: #111; margin: 0 0 5px; letter-spacing: 0.08em; }
  #printWrap .print-legend { display: flex; gap: 14px; justify-content: center; margin-bottom: 6px; flex-wrap: wrap; }
  #printWrap .print-legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.65rem; color: #555; }
  #printWrap .print-legend-dot { width: 7px; height: 7px; border-radius: 50%; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #printWrap table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  #printWrap thead th { font-size: 0.72rem; font-weight: 700; color: #444; padding: 5px 2px; text-align: center; border: 1px solid #ccc; background: #f0f0f0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #printWrap thead th:first-child { color: #c0392b; }
  #printWrap thead th:last-child  { color: #2980b9; }
  #printWrap tbody td { padding: 2px 1px; text-align: center; vertical-align: middle; border: 1px solid #ccc; width: calc(100% / 7); }
  #printWrap.orient-portrait  tbody tr { height: 35mm; }
  #printWrap.orient-landscape tbody tr { height: 22mm; }
  #printWrap .p-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3px 1px; gap: 2px; height: 100%; }
  #printWrap .p-day { font-size: 0.95rem; font-weight: 700; color: #111; line-height: 1; margin-bottom: 3px; }
  #printWrap .p-day.sun { color: #c0392b; }
  #printWrap .p-day.holiday { color: #c0392b; }
  #printWrap .p-day.sat { color: #2980b9; }
  #printWrap .p-shift-row { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
  #printWrap .p-badge { font-size: 0.62rem; font-weight: 700; border-radius: 3px; padding: 1px 4px; line-height: 1.5; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #printWrap .p-badge.b朝 { color: #1d4ed8; background: #dbeafe; }
  #printWrap .p-badge.b昼 { color: #92400e; background: #fef3c7; }
  #printWrap .p-badge.b夜 { color: #5b21b6; background: #ede9fe; }
  #printWrap .p-badge.b休 { color: #991b1b; background: #fee2e2; }

  const closePrintBtn   = document.getElementById('closePrintModal');
  const doPrintBtn      = document.getElementById('doPrint');
  const printModal      = document.getElementById('printModal');
  const printYearSel    = document.getElementById('printYear');
  const printMonthSel   = document.getElementById('printMonth');
  const printOrientSel  = document.getElementById('printOrientation');
  const printWrap       = document.getElementById('printWrap');
  const newsModal       = document.getElementById('newsModal');
  const openNewsBtn     = document.getElementById('openNewsModal');
  const closeNewsBtn    = document.getElementById('closeNewsModal');
  const newsBadge       = document.getElementById('newsBadge');
  const newsList        = document.getElementById('newsList');
  const kyuukaModal     = document.getElementById('kyuukaModal');
  const openKyuukaBtn   = document.getElementById('openKyuukaModal');
  const closeKyuukaBtn  = document.getElementById('closeKyuukaModal');
  const kyuukaDateInput = document.getElementById('kyuukaDateInput');
  const kyuukaAddBtn    = document.getElementById('kyuukaAddBtn');
  const kyuukaListEl    = document.getElementById('kyuukaList');
  const settingsModal   = document.getElementById('settingsModal');
  const openSettingsBtn = document.getElementById('openSettingsModal');
  const closeSettingsBtn= document.getElementById('closeSettingsModal');
  const themeToggleBtn  = document.getElementById('themeToggleInSettings');
  const themeModeLabel  = document.getElementById('themeModeLabel');
  const autoPurgeToggle = document.getElementById('autoPurgeToggle');
  const purgeTimingRow  = document.getElementById('purgeTimingRow');
  const purgeTimingSelect=document.getElementById('purgeTimingSelect');
  const openDataBtn     = document.getElementById('openDataModal');
  const dataModal       = document.getElementById('dataModal');
  const closeDataBtn    = document.getElementById('closeDataModal');
  const dataListEl      = document.getElementById('dataList');
  const deleteAllBtn    = document.getElementById('deleteAllDataBtn');

  for (let y = today.getFullYear() - 1; y <= today.getFullYear() + 1; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '年';
    if (y === today.getFullYear()) o.selected = true;
    printYearSel.appendChild(o);
  }
  printMonthSel.value = today.getMonth();

  const savedTeam = localStorage.getItem(KEYS.team);
  if (savedTeam && (teamBaseDates[savedTeam] || savedTeam === "ALL")) teamSelect.value = savedTeam;
  const savedMonths = localStorage.getItem(KEYS.months);
  if (savedMonths) monthsSelect.value = savedMonths;
  const savedTheme = localStorage.getItem(KEYS.theme);
  if (savedTheme === "light") document.documentElement.classList.add("light");
  const savedAutoPurge = localStorage.getItem(KEYS.autoPurge);
  autoPurgeToggle.checked = savedAutoPurge !== "off";
  const savedTiming = localStorage.getItem(KEYS.purgeTiming) || "month";
  purgeTimingSelect.value = savedTiming;
  purgeTimingRow.style.opacity = autoPurgeToggle.checked ? "1" : "0.4";
  purgeTimingRow.style.pointerEvents = autoPurgeToggle.checked ? "auto" : "none";

  function updateThemeLabel() {
    themeModeLabel.textContent = document.documentElement.classList.contains("light") ? "ライトモード" : "ダークモード";
  }
  updateThemeLabel();

  themeToggleBtn.addEventListener('click', () => {
    document.documentElement.classList.toggle("light");
    const isLight = document.documentElement.classList.contains("light");
    localStorage.setItem(KEYS.theme, isLight ? "light" : "dark");
    updateThemeLabel();
    setTimeout(() => themeToggleBtn.blur(), 100);
  });

  autoPurgeToggle.addEventListener('change', () => {
    localStorage.setItem(KEYS.autoPurge, autoPurgeToggle.checked ? "on" : "off");
    purgeTimingRow.style.opacity = autoPurgeToggle.checked ? "1" : "0.4";
    purgeTimingRow.style.pointerEvents = autoPurgeToggle.checked ? "auto" : "none";
  });
  purgeTimingSelect.addEventListener('change', () => {
    localStorage.setItem(KEYS.purgeTiming, purgeTimingSelect.value);
  });

  function diffDays(a, b) {
    return Math.floor((Date.UTC(b.getFullYear(),b.getMonth(),b.getDate()) - Date.UTC(a.getFullYear(),a.getMonth(),a.getDate())) / 86400000);
  }
  function getShift(teamKey, date) {
    const base = new Date(teamBaseDates[teamKey] + 'T00:00');
    return cycle[((diffDays(base, date) % 8) + 8) % 8];
  }

  function loadKyuuka() { try { return JSON.parse(localStorage.getItem(KEYS.kyuuka) || "[]"); } catch { return []; } }
  function saveKyuuka(arr) { localStorage.setItem(KEYS.kyuuka, JSON.stringify(arr)); }

  function purgePastKyuuka() {
    if (localStorage.getItem(KEYS.autoPurge) === "off") return;
    const timing = localStorage.getItem(KEYS.purgeTiming) || "month";
    let threshold;
    if (timing === "day") {
      threshold = dateKey(today);
    } else {
      threshold = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
    }
    const filtered = timing === "day"
      ? loadKyuuka().filter(d => d >= threshold)
      : loadKyuuka().filter(d => d.slice(0,7) >= threshold);
    saveKyuuka(filtered);
  }
  purgePastKyuuka();

  function isKyuuka(date) {
    if (teamSelect.value === 'ALL') return false;
    return loadKyuuka().includes(dateKey(date));
  }

  function renderKyuukaList() {
    const arr = loadKyuuka().sort();
    kyuukaListEl.innerHTML = '';
    if (arr.length === 0) {
      kyuukaListEl.innerHTML = '<div class="kyuuka-list-empty">有給の登録はありません</div>';
      return;
    }
    arr.forEach(d => {
      const row = document.createElement('div');
      row.className = 'kyuuka-list-item';
      row.innerHTML = `<span class="kyuuka-list-item-date">${d.replace(/-/g,'/')}</span><button class="kyuuka-list-item-del" data-date="${d}" aria-label="削除">✕</button>`;
      row.querySelector('.kyuuka-list-item-del').addEventListener('click', () => {
        saveKyuuka(loadKyuuka().filter(x => x !== d));
        renderKyuukaList(); render();
      });
      kyuukaListEl.appendChild(row);
    });
  }

  kyuukaAddBtn.addEventListener('click', () => {
    const val = kyuukaDateInput.value;
    if (!val) return;
    const arr = loadKyuuka();
    if (!arr.includes(val)) { arr.push(val); saveKyuuka(arr); }
    kyuukaDateInput.value = '';
    renderKyuukaList(); render();
  });

  function calcStorageStats() {
    const MAX_BYTES = 5 * 1024 * 1024;
    let appBytes = 0;
    Object.values(KEYS).forEach(k => {
      const v = localStorage.getItem(k);
      if (v) appBytes += (k.length + v.length) * 2;
    });
    let totalBytes = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      const v = localStorage.getItem(k);
      totalBytes += (k.length + v.length) * 2;
    }
    const pct = Math.min((totalBytes / MAX_BYTES) * 100, 100);
    const appKB = (appBytes / 1024).toFixed(2);
    const remainMB = ((MAX_BYTES - totalBytes) / 1024 / 1024).toFixed(2);
    document.getElementById('storageUsed').textContent = `${appKB} KB`;
    document.getElementById('storageRemain').textContent = `残り ${remainMB} MB`;
    const bar = document.getElementById('storageBar');
    bar.style.width = pct + '%';
    bar.className = 'storage-bar' + (pct >= 90 ? ' danger' : pct >= 70 ? ' warn' : '');
    document.getElementById('storageNote').textContent = `全体 ${(totalBytes/1024).toFixed(1)} KB / 上限 5 MB`;
  }

  function renderDataList() {
    calcStorageStats();
    dataListEl.innerHTML = '';
    const allKeys = Object.values(KEYS);
    const existing = allKeys.filter(k => localStorage.getItem(k) !== null);
    if (existing.length === 0) {
      dataListEl.innerHTML = '<div class="data-empty">保存データはありません</div>';
      return;
    }
    existing.forEach(k => {
      const raw = localStorage.getItem(k);
      let display = raw;
      if (k === KEYS.kyuuka) {
        try {
          const arr = JSON.parse(raw);
          display = arr.length > 0 ? arr.join(', ') : '（なし）';
        } catch { display = raw; }
      }
      const item = document.createElement('div');
      item.className = 'data-item';
      item.innerHTML = `
        <div class="data-item-info">
          <span class="data-item-key">${KEY_LABELS[k] || k}</span>
          <span class="data-item-val">${display}</span>
        </div>
        <button class="data-item-del" aria-label="削除">✕</button>`;
      item.querySelector('.data-item-del').addEventListener('click', () => {
        localStorage.removeItem(k);
        renderDataList(); render();
      });
      dataListEl.appendChild(item);
    });
  }

  deleteAllBtn.addEventListener('click', () => {
    if (!confirm('すべての保存データを削除しますか？')) return;
    Object.values(KEYS).forEach(k => localStorage.removeItem(k));
    renderDataList(); render();
  });

  openKyuukaBtn.addEventListener('click', () => { renderKyuukaList(); kyuukaModal.classList.add('open'); });
  closeKyuukaBtn.addEventListener('click', () => kyuukaModal.classList.remove('open'));
  kyuukaModal.addEventListener('click', e => { if (e.target === kyuukaModal) kyuukaModal.classList.remove('open'); });

  openSettingsBtn.addEventListener('click', () => { updateThemeLabel(); settingsModal.classList.add('open'); });
  closeSettingsBtn.addEventListener('click', () => settingsModal.classList.remove('open'));
  settingsModal.addEventListener('click', e => { if (e.target === settingsModal) settingsModal.classList.remove('open'); });

  openDataBtn.addEventListener('click', () => { renderDataList(); dataModal.classList.add('open'); });
  closeDataBtn.addEventListener('click', () => dataModal.classList.remove('open'));
  dataModal.addEventListener('click', e => { if (e.target === dataModal) dataModal.classList.remove('open'); });

  const STORAGE_KEY_NEWS = KEYS.newsRead;
  function getReadDate() { return localStorage.getItem(STORAGE_KEY_NEWS) || null; }
  function markAllRead() { localStorage.setItem(STORAGE_KEY_NEWS, NEWS_DATA[0]?.date || ""); }
  function countUnread() { const r = getReadDate(); return r ? NEWS_DATA.filter(n => n.date > r).length : NEWS_DATA.length; }
  function updateBadge() {
    const n = countUnread();
    if (n > 0) { newsBadge.textContent = n; newsBadge.classList.remove('hidden'); }
    else newsBadge.classList.add('hidden');
  }
  function buildNewsList() {
    const readDate = getReadDate();
    newsList.innerHTML = '';
    NEWS_DATA.forEach(item => {
      const isNew = !readDate || item.date > readDate;
      const div = document.createElement('div');
      div.className = `news-item type-${item.type}`;
      div.innerHTML = `
        <div class="news-item-meta">
          <span class="news-item-date">${item.date.replace(/-/g,'/')}</span>
          <span class="news-item-tag tag-${item.type}">${TYPE_LABEL[item.type] || item.type}</span>
          ${isNew ? '<span class="news-item-tag tag-notice">NEW</span>' : ''}
        </div>
        <div class="news-item-title">${item.title}</div>
        ${item.body ? `<div class="news-item-body">${item.body}</div>` : ''}`;
      newsList.appendChild(div);
    });
  }

  openNewsBtn.addEventListener('click', () => { buildNewsList(); newsModal.classList.add('open'); markAllRead(); updateBadge(); });
  closeNewsBtn.addEventListener('click', () => newsModal.classList.remove('open'));
  newsModal.addEventListener('click', e => { if (e.target === newsModal) newsModal.classList.remove('open'); });

  [openKyuukaBtn, closeKyuukaBtn, openSettingsBtn, closeSettingsBtn,
   openNewsBtn, closeNewsBtn, openDataBtn, closeDataBtn, deleteAllBtn, themeToggleBtn
  ].forEach(btn => btn && btn.addEventListener('pointerup', () => setTimeout(() => btn.blur(), 100)));

  goTodayBtn.addEventListener('click', () => { startYear = today.getFullYear(); startMonth = today.getMonth(); render(); });
  goTodayBtn.addEventListener('pointerup', () => setTimeout(() => goTodayBtn.blur(), 100));
  goTodayBtn.addEventListener('touchend', e => { e.preventDefault(); goTodayBtn.click(); goTodayBtn.blur(); });
  [prevBtn, nextBtn].forEach(btn => {
    btn.addEventListener('pointerup', () => setTimeout(() => btn.blur(), 100));
    btn.addEventListener('touchend', e => { e.preventDefault(); btn.click(); btn.blur(); });
  });

  function updateMonthLabel() { monthLabel.textContent = `${startYear}年 ${startMonth + 1}月`; }

  function renderSingleTeam(team, months) {
    for (let m = 0; m < months; m++) {
      const first = new Date(startYear, startMonth + m, 1);
      const last  = new Date(startYear, startMonth + m + 1, 0);
      const box = document.createElement('div');
      box.className = 'month single-team';
      box.innerHTML = `<h3>${first.getFullYear()}年 ${first.getMonth()+1}月</h3>`;
      const table = document.createElement('table');
      table.innerHTML = '<thead><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr></thead>';
      const tbody = document.createElement('tbody');
      let tr = document.createElement('tr');
      for (let i = 0; i < first.getDay(); i++) tr.appendChild(document.createElement('td'));
      for (let d = 1; d <= last.getDate(); d++) {
        if (tr.children.length === 7) { tbody.appendChild(tr); tr = document.createElement('tr'); }
        const cur = new Date(first.getFullYear(), first.getMonth(), d);
        const dow = cur.getDay(); const holi = holidayName(cur);
        const s = isKyuuka(cur) ? '有給' : getShift(team, cur);
        const td = document.createElement('td');
        if (cur.toDateString() === today.toDateString()) td.classList.add('today');
        if (dow === 0) td.classList.add('sun');
        if (dow === 6) td.classList.add('sat');
        if (holi) td.classList.add('holi');
        td.innerHTML = `<div class="cell-inner"><span class="day-num">${d}</span><span class="day-shift s${s}">${s}</span></div>`;
        tr.appendChild(td);
      }
      while (tr.children.length < 7) tr.appendChild(document.createElement('td'));
      tbody.appendChild(tr); table.appendChild(tbody); box.appendChild(table); container.appendChild(box);
    }
  }

  function renderAllTeams(months) {
    for (let m = 0; m < months; m++) {
      const first = new Date(startYear, startMonth + m, 1);
      const last  = new Date(startYear, startMonth + m + 1, 0);
      const box = document.createElement('div');
      box.className = 'month all-team';
      box.innerHTML = `<h3>${first.getFullYear()}年 ${first.getMonth()+1}月</h3>`;
      const table = document.createElement('table');
      table.innerHTML = '<thead><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr></thead>';
      const tbody = document.createElement('tbody');
      let tr = document.createElement('tr');
      for (let i = 0; i < first.getDay(); i++) tr.appendChild(document.createElement('td'));
      for (let d = 1; d <= last.getDate(); d++) {
        if (tr.children.length === 7) { tbody.appendChild(tr); tr = document.createElement('tr'); }
        const cur = new Date(first.getFullYear(), first.getMonth(), d);
        const dow = cur.getDay(); const holi = holidayName(cur);
        const td = document.createElement('td');
        if (cur.toDateString() === today.toDateString()) td.classList.add('today');
        if (dow === 0) td.classList.add('sun');
        if (dow === 6) td.classList.add('sat');
        if (holi) td.classList.add('holi');
        const rows = { 朝:[], 昼:[], 夜:[] };
        for (const t of teams) { const s = getShift(t, cur); if (s !== '休') rows[s].push(t); }
        const makeRow = shift => `<div class="shift-row row-${shift}">${rows[shift].map(t=>`<span class="shift-badge">${t}</span>`).join('')}</div>`;
        td.innerHTML = `<div class="cell-all"><span class="all-day-num">${d}</span>${makeRow('朝')}${makeRow('昼')}${makeRow('夜')}</div>`;
        tr.appendChild(td);
      }
      while (tr.children.length < 7) tr.appendChild(document.createElement('td'));
      tbody.appendChild(tr); table.appendChild(tbody); box.appendChild(table); container.appendChild(box);
    }
  }

  function render() {
    container.innerHTML = '';
    updateMonthLabel();
    const team = teamSelect.value;
    const months = parseInt(monthsSelect.value, 10);
    if (team === 'ALL') renderAllTeams(months);
    else renderSingleTeam(team, months);
  }

  function buildPrintHTML(year, month) {
    const first = new Date(year, month, 1);
    const last  = new Date(year, month + 1, 0);
    let rows = '', tr = '', colIdx = 0;
    for (let i = 0; i < first.getDay(); i++) { tr += '<td></td>'; colIdx++; }
    for (let d = 1; d <= last.getDate(); d++) {
      if (colIdx === 7) { rows += `<tr>${tr}</tr>`; tr = ''; colIdx = 0; }
      const cur = new Date(year, month, d); const dow = cur.getDay(); const holi = holidayName(cur);
      const dayClass = (dow === 0 || holi) ? 'holiday' : dow === 6 ? 'sat' : '';
      const holiHTML = holi ? `<span class="p-holiday-name">${holi}</span>` : '';
      const shiftsByType = { 朝:[], 昼:[], 夜:[], 休:[] };
      for (const t of teams) shiftsByType[getShift(t, cur)].push(t);
      const badges = s => shiftsByType[s].map(t=>`<span class="p-badge b${s}">${t}</span>`).join('');
      const shiftHTML = ['朝','昼','夜'].map(s => { const b=badges(s); return b?`<div class="p-shift-row">${b}</div>`:''; }).join('');
      const restHTML = badges('休') ? `<div class="p-shift-row">${badges('休')}</div>` : '';
      tr += `<td><div class="p-cell"><span class="p-day ${dayClass}">${d}</span>${holiHTML}${shiftHTML}${restHTML}</div></td>`;
      colIdx++;
    }
    while (colIdx < 7) { tr += '<td></td>'; colIdx++; }
    rows += `<tr>${tr}</tr>`;
    return `
      <div class="print-title">${year}年 ${month+1}月 全班シフト</div>
      <div class="print-legend">
        <div class="print-legend-item"><div class="print-legend-dot" style="background:#3b82f6"></div>朝勤 7:00～15:15</div>
        <div class="print-legend-item"><div class="print-legend-dot" style="background:#f59e0b"></div>午后勤 15:00～22:45</div>
        <div class="print-legend-item"><div class="print-legend-dot" style="background:#8b5cf6"></div>夜勤 22:30～7:15</div>
        <div class="print-legend-item"><div class="print-legend-dot" style="background:#ef4444"></div>休み</div>
      </div>
      <table>
        <thead><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  openPrintBtn.addEventListener('click', () => printModal.classList.add('open'));
  closePrintBtn.addEventListener('click', () => printModal.classList.remove('open'));
  printModal.addEventListener('click', e => { if (e.target === printModal) printModal.classList.remove('open'); });
  doPrintBtn.addEventListener('click', () => {
    const y = parseInt(printYearSel.value, 10);
    const m = parseInt(printMonthSel.value, 10);
    const orient = printOrientSel.value;
    let ps = document.getElementById('dynamicPageStyle');
    if (!ps) { ps = document.createElement('style'); ps.id = 'dynamicPageStyle'; document.head.appendChild(ps); }
    ps.textContent = `@page { size: A4 ${orient}; margin: 8mm 10mm; }`;
    printWrap.innerHTML = buildPrintHTML(y, m);
    printWrap.className = `orient-${orient}`;
    printWrap.style.display = 'block';
    printModal.classList.remove('open');
    setTimeout(() => { window.print(); setTimeout(() => { printWrap.style.display = 'none'; }, 500); }, 150);
  });
  [openPrintBtn, closePrintBtn, doPrintBtn].forEach(btn => btn.addEventListener('pointerup', () => setTimeout(() => btn.blur(), 100)));

  teamSelect.onchange = () => { localStorage.setItem(KEYS.team, teamSelect.value); render(); };
  monthsSelect.onchange = () => { localStorage.setItem(KEYS.months, monthsSelect.value); render(); };
  prevBtn.onclick = () => { startMonth--; if (startMonth < 0) { startMonth = 11; startYear--; } render(); };
  nextBtn.onclick = () => { startMonth++; if (startMonth > 11) { startMonth = 0; startYear++; } render(); };

  container.innerHTML = '<div class="loading-msg">読み込み中...</div>';
  fetch('day.json')
    .then(r => r.json())
    .then(data => { teamBaseDates = { ...teamBaseDates, ...data }; })
    .catch(() => {})
    .finally(() => { updateBadge(); render(); });
})();
</script>
<footer class="site-footer"><small>Created by S │ THX</small></footer>
</body>
